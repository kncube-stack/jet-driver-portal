<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#FFA500" />
  <title>JetPortal</title>
  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" href="/favicon.ico" type="image/x-icon">
  <link rel="icon" href="/icon-192.png" type="image/png" sizes="192x192">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="/index_files/react.production.min.js"></script>
  <script src="/index_files/react-dom.production.min.js"></script>
  <script>
    window.va =
      window.va ||
      function () {
        (window.vaq = window.vaq || []).push(arguments);
      };
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
  <style>html,body{margin:0;padding:0;background:#0a0e17}*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}</style>
</head>
<body>
  <div id="root"></div>
  <script>
    (function () {
      var host = (window.location.hostname || "").toLowerCase();
      var path = window.location.pathname || "/";
      var isDutyCardsHost = host === "jet-duty-cards.vercel.app" || host.indexOf("jet-duty-cards-") === 0;
      var isRootPath = path === "/" || path === "/index.html";
      if (isDutyCardsHost && isRootPath) {
        window.location.replace("/duty-cards/");
      }
    })();
  </script>
  <script>
    (function () {
      var LAST_HIDDEN_KEY = "jet_last_hidden_at";
      var LAST_FORCED_RELOAD_KEY = "jet_last_forced_reload_at";
      var MIN_HIDDEN_MS = 15000;
      var RELOAD_COOLDOWN_MS = 15000;

      function now() {
        return Date.now();
      }

      function getStoredNumber(key) {
        try {
          return Number(sessionStorage.getItem(key) || "0");
        } catch (err) {
          return 0;
        }
      }

      function setStoredNumber(key, value) {
        try {
          sessionStorage.setItem(key, String(value));
        } catch (err) {}
      }

      function wasHiddenLongEnough() {
        var hiddenAt = getStoredNumber(LAST_HIDDEN_KEY);
        return hiddenAt > 0 && now() - hiddenAt >= MIN_HIDDEN_MS;
      }

      function reloadedRecently() {
        var reloadedAt = getStoredNumber(LAST_FORCED_RELOAD_KEY);
        return reloadedAt > 0 && now() - reloadedAt < RELOAD_COOLDOWN_MS;
      }

      function forceFreshOpen() {
        if (reloadedRecently()) return;
        setStoredNumber(LAST_FORCED_RELOAD_KEY, now());
        window.location.reload();
      }

      document.addEventListener("visibilitychange", function () {
        if (document.hidden) {
          setStoredNumber(LAST_HIDDEN_KEY, now());
          return;
        }
        if (wasHiddenLongEnough()) forceFreshOpen();
      });

      window.addEventListener("focus", function () {
        if (wasHiddenLongEnough()) forceFreshOpen();
      });

      window.addEventListener("pageshow", function (event) {
        if (event.persisted) forceFreshOpen();
      });
    })();
  </script>
  <script src="/index_files/jet-data.js"></script>
  <script src="/index_files/jet-data-layer.js"></script>
  <script src="/index_files/jet-ui-helpers.js"></script>
  <script src="/index_files/jet-stop-directory.js"></script>
  <script src="/index_files/app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('/sw.js').then(function (registration) {
          registration.update().catch(function () {});
        }).catch(function () {});
      });
    }
  </script>
</body>
</html>
