// Helper: get today's run out data for a given duty
function getTodayRunout(dutyNum) {
  const dateKey = new Date().toISOString().slice(0, 10);
  const todayData = DAILY_RUNOUT[dateKey];
  if (!todayData) return null;
  return todayData[dutyNum] || null;
}

// Helper: get run out info for a driver by name (checks today's sheet)
function getDriverRunout(driverName) {
  const dateKey = new Date().toISOString().slice(0, 10);
  const todayData = DAILY_RUNOUT[dateKey];
  if (!todayData) return null;
  for (const [dutyNum, info] of Object.entries(todayData)) {
    if (info.driver === driverName) return {
      duty: parseInt(dutyNum),
      ...info
    };
  }
  return null;
}

function getWeekCommencing() {
  const now = new Date();
  const day = now.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  const monday = new Date(now);
  monday.setDate(now.getDate() + diff);
  return monday.toLocaleDateString("en-GB", {
    day: "numeric",
    month: "short",
    year: "numeric"
  });
}
function isDutyNumber(val) {
  return /^\d+$/.test(val);
}
function getSpecialDuty(val) {
  if (!val) return null;

  if (SPECIAL_DUTIES[val]) return SPECIAL_DUTIES[val];

  if (val.startsWith("AVRA")) return {
    label: val,
    signOn: "—",
    signOff: "—",
    dutyLength: "—",
    color: "#fb7185"

    label: `Private Hire ${val}`,
    signOn: "—",
    signOff: "—",
    dutyLength: "—",
    color: "#ec4899"
  };
  return null;
}
