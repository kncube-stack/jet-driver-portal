// Helper: get today's run out data for a given duty
function getTodayRunout(dutyNum) {
  const dateKey = new Date().toISOString().slice(0, 10);
  const todayData = DAILY_RUNOUT[dateKey];
  if (!todayData) return null;
  return todayData[dutyNum] || null;
}

// Helper: get run out info for a driver by name (checks today's sheet)
function getDriverRunout(driverName) {
  const dateKey = new Date().toISOString().slice(0, 10);
  const todayData = DAILY_RUNOUT[dateKey];
  if (!todayData) return null;
  for (const [dutyNum, info] of Object.entries(todayData)) {
    if (info.driver === driverName) return {
      duty: parseInt(dutyNum),
      ...info
    };
  }
  return null;
}

// Extracted automatically from Excel cell comments (manager annotations)
// filterNote() strips sensitive manager-to-manager content from public view
// Operational info (times, routes, coach assignments) passes through

const SENSITIVE_PATTERNS = [/spoken\s*(and|&)\s*agreed/i, /agreed/i, /requested\b/i, /available\s*(for\s*ot)?/i, /holiday/i, /doc\s*letter/i, /showed\s*me/i, /talk\s*to\s*me/i];
function filterNote(note) {
  if (!note) return null;
  // Split into lines, keep only operational ones
  const lines = note.split("\n");
  const kept = [];
  for (const line of lines) {
    const trimmed = line.trim();
    if (!trimmed) continue;
    // Skip manager attribution lines (e.g. "Mahmudul Hoque:")
    if (/^[A-Z][a-z]+\s+[A-Z][a-z]+:$/.test(trimmed)) continue;
    // Also skip "JOAO —" or "Muhammed Ali:" style
    if (/^[A-Z.\s]+[—\-:]/.test(trimmed) && trimmed.length < 40 && !trimmed.match(/\d{4}/)) continue;
    // Skip sensitive lines
    if (SENSITIVE_PATTERNS.some(p => p.test(trimmed))) continue;
    kept.push(trimmed);
  }
  if (kept.length === 0) return null;
  return kept.join("\n");
}

async function discoverSheetTabs() {
  const res = await fetch(GSHEET_PUB_BASE + "/pubhtml");
  const html = await res.text();
  const tabs = {};
  const regex = /name:\s*"(WC \d{2}\.\d{2}\.\d{4})".*?gid:\s*"(\d+)"/g;
  let m;
  while ((m = regex.exec(html)) !== null) tabs[m[1]] = m[2];
  return tabs;
}
function findCurrentWeekTab(tabs) {
  const now = new Date();
  const day = now.getDay();
  const diffToMon = day === 0 ? 6 : day - 1;
  const monday = new Date(now);
  monday.setDate(now.getDate() - diffToMon);
  const fmt = d => {
    const dd = String(d.getDate()).padStart(2, "0");
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    return `WC ${dd}.${mm}.${d.getFullYear()}`;
  };
  const key = fmt(monday);
  if (tabs[key]) return {
    tabName: key,
    gid: tabs[key]
  };
  const nextMon = new Date(monday);
  nextMon.setDate(monday.getDate() + 7);
  const key2 = fmt(nextMon);
  if (tabs[key2]) return {
    tabName: key2,
    gid: tabs[key2]
  };
  const keys = Object.keys(tabs);
  const lastKey = keys[keys.length - 1];
  return {
    tabName: lastKey,
    gid: tabs[lastKey]
  };
}
async function fetchTabCSV(gid) {
  const res = await fetch(GSHEET_PUB_BASE + `/pub?gid=${gid}&single=true&output=csv`);
  return await res.text();
}
function parseCSVRow(line) {
  const result = [];
  let current = "";
  let inQ = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQ && i + 1 < line.length && line[i + 1] === '"') {
        current += '"';
        i++;
      } else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      result.push(current);
      current = "";
    } else current += ch;
  }
  result.push(current);
  return result;
}
function parseRotaCSV(csvText) {
  const lines = csvText.split(/\r?\n/).filter(l => l.trim());
  const rows = lines.map(l => parseCSVRow(l));
  const sections = [];
  const rota = {};
  let curKey = null;
  let curDrivers = [];
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];
    const colA = (row[0] || "").trim();
    const colB = (row[1] || "").trim();
    const days = row.slice(2, 9).map(d => {
      const v = (d || "").trim();
      return v === "" ? null : v;
    });
    if (colA && !colB && SECTION_KEY_MAP.hasOwnProperty(colA)) {
      if (curKey && curDrivers.length > 0) {
        sections.push({
          key: curKey,
          label: SECTION_LABEL_MAP[curKey],
          drivers: [...curDrivers]
        });
        curDrivers = [];
      }
      const newKey = SECTION_KEY_MAP[colA];
      curKey = newKey; // null for "Work to cover"
      continue;
    }
    if (colA && colB && /^\d+$/.test(colB)) {
      if (curKey) {
        curDrivers.push(colA);
        rota[colA] = days;
      } else {
        // Between sections (e.g. Frankie/Marius after Part Time gap) — attach to previous
        if (sections.length > 0) {
          sections[sections.length - 1].drivers.push(colA);
          rota[colA] = days;
        }
      }
      continue;
    }
  }
  if (curKey && curDrivers.length > 0) {
    sections.push({
      key: curKey,
      label: SECTION_LABEL_MAP[curKey],
      drivers: [...curDrivers]
    });
  }
  return {
    sections,
    rota
  };
}
function formatWeekCommencing(tabName) {
