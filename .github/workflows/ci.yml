name: CI
on:
  pull_request:
  push:
    branches: [main]

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Node checks (if package.json exists)
        shell: bash
        run: |
          set -e
          if [ -f package.json ]; then
            npm ci
            npm run lint --if-present
            npm test --if-present
            npm run build --if-present
          else
            echo "No package.json; skipping Node CI."
          fi