name: Agent

on:
  issues:
    types: [labeled]
  workflow_dispatch:

jobs:
  run:
    runs-on: [self-hosted, agent]

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Build task file from issue
        if: github.event_name == 'issues'
        shell: bash
        run: |
          mkdir -p .agent
          echo "${{ github.event.issue.title }}" > .agent/title.txt
          echo "${{ github.event.issue.body }}" > .agent/body.txt
          printf "TITLE: %s\n\n%s\n" "$(cat .agent/title.txt)" "$(cat .agent/body.txt)" > .agent/task.txt
          echo "${{ github.event.issue.number }}" > .agent/issue_number.txt

      - name: Manual dispatch task file
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          mkdir -p .agent
          echo "Manual run" > .agent/task.txt
          echo "0" > .agent/issue_number.txt

      - name: Run agent
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          chmod +x scripts/agent/run.sh
          scripts/agent/run.sh .agent/task.txt .agent/issue_number.txt